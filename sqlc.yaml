version: "2"
cloud:
  project: "citual"

plugins:
  - name: golang
    wasm:
      url: https://downloads.sqlc.dev/plugin/golang/v1.2.0/golang.wasm
      sha256: 343362a26c48325691060f64da76dc22709e30a51980036616035824b2165287



sql:

# Identity server

  - name: "identity server"
    engine: "postgresql"
    schema: "internal/modules/identity/sql/migrations"
    queries: "internal/modules/identity/sql/queries"
    gen:
      go:
        package: "sqlc"
        out: "internal/modules/identity/adapters/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true      # Essential for mocking in tests
        emit_exact_table_names: true
        emit_pointers_for_null_types: true
        emit_empty_slices: true   # Returns []T{} instead of nil for empty results
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
