version: '3.9'

# ── Spur Platform Stack ────────────────────────────────────────────────────
# API:     http://localhost:8080
# Studio:  http://localhost:3000
# Grafana: http://localhost:3001  (admin / ${GRAFANA_PASSWORD:-admin})
# ──────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-spur}
      POSTGRES_USER:     ${POSTGRES_USER:-spur}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spur}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  # ── Application ───────────────────────────────────────────────────────────

  backend:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-spur}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-spur}?sslmode=disable
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
      - "9091:9091"
    volumes:
      - ../keys:/app/keys:ro
    labels:
      app: spur
      module: backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        tag: "{{.Name}}"

  studio:
    build:
      context: ..
      dockerfile: Dockerfile.ui
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_THEME:   ${NEXT_PUBLIC_THEME:-spur}
        SPUR_APP_NAME:       ${SPUR_APP_NAME:-Spur}
    restart: unless-stopped
    ports:
      - "3000:3000"
    labels:
      app: spur
      module: studio
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Observability ─────────────────────────────────────────────────────────

  loki:
    image: grafana/loki:2.9.0
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./deployments/loki/config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.0
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./deployments/promtail/config.yaml:/etc/promtail/config.yml:ro
      - promtail_pos:/tmp/promtail
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.47.0
    restart: unless-stopped
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployments/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.2.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployments/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD:      ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:          "false"
      GF_ANALYTICS_REPORTING_ENABLED:  "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/spur-overview.json
    depends_on:
      - loki
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      retries: 5

volumes:
  pg_data:
  redis_data:
  loki_data:
  promtail_pos:
  prometheus_data:
  grafana_data:
