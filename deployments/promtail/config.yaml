server:
  http_listen_port: 9080
  grpc_listen_port: 0
positions:
  filename: /tmp/promtail/positions.yaml
clients:
  - url: http://loki:3100/loki/api/v1/push
scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container
        regex: '/?(.*)'
      - source_labels: ['__meta_docker_container_label_app']
        action: keep
        regex: spur
      - source_labels: ['__meta_docker_container_label_module']
        target_label: module
      - target_label: app
        replacement: spur
    pipeline_stages:
      - json:
          expressions:
            level: level
            module: module
            tenant_id: tenant_id
            user_id: user_id
            request_id: request_id
            duration_ms: duration_ms
            error: error
      - labels:
          level:
          module:
      - timestamp:
          source: time
          format: RFC3339
      - output:
          source: message
